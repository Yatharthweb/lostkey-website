                  <input type="tel" required placeholder="021 123 4567" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="w-full bg-[#132B4F] border border-white/10 rounded-xl text-white p-4 text-sm" />
                </div>
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-gray-300 mb-2">Your Message*</label>
                  <textarea required rows={4} placeholder="Describe how we can help you..." value={formData.message} onChange={(e) => setFormData({...formData, message: e.target.value})} className="w-full bg-[#132B4F] border border-white/10 rounded-xl text-white p-4 text-sm resize-none"></textarea>
                </div>
                <button type="submit" className="px-10 py-4 font-black text-xs uppercase rounded-full" style={{ backgroundColor: COLORS.yellow, color: COLORS.black }}>
                  SEND MESSAGE
                </button>
              </form>
            )}
          </div>
        </div>
      </section>

      {/* GUARANTEE */}
      <section className="py-20 bg-white">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="bg-[#FFF8E1] border-2 border-[#F4C430] rounded-3xl p-8 md:p-12 shadow-lg">
            <h3 className="text-3xl font-black text-[#1F2937] mb-4">Our Guarantee</h3>
            <p className="text-gray-700 text-lg leading-relaxed font-medium">
              Every job comes with our workmanship guarantee. If a lock or key we've fitted doesn't work as it should, we'll come back and make it right at no extra cost to you. We also offer Afterpay on our services, so an unexpected callout doesn't have to be paid in full upfront.
            </p>
          </div>
        </div>
      </section>

      {/* URGENT BANNER */}
      <section className="py-16 bg-[#0B1F3A] text-white text-center">
        <h2 className="text-3xl md:text-5xl font-black mb-4">Locked out right now?</h2>
        <p className="text-xl text-gray-300 mb-6">Don't wait — call <strong className="text-[#F4C430]">0800 828 345</strong> and we'll have someone on the way.</p>
        <a href="tel:0800828345" className="inline-flex items-center px-8 py-5 rounded-full font-black text-xl uppercase" style={{ backgroundColor: COLORS.yellow, color: COLORS.black }}>
          Call 0800 828 345 Now
        </a>
      </section>

      {/* FOOTER */}
      <footer style={{ backgroundColor: COLORS.black }} className="py-12 text-center text-gray-400 text-sm">
        <p>© 2026 LostKey. All Rights Reserved.</p>
      </footer>
    </div>
  );
}

root.render(<ContactUsHtmlPage />);
    </script>
