          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {filteredReviews.map((rev) => (
              <div 
                key={(rev.id || rev.time || Math.random().toString())} 
                className="bg-white rounded-3xl p-7 shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col justify-between group"
              >
                <div>
                  {/* Card Header: Rating & Source */}
                  <div className="flex justify-between items-center mb-5">
                    <div className="flex items-center space-x-1">
                      {[...Array(rev.rating || 5)].map((_, i) => (
                        <Star key={i} size={18} fill="#F4C430" color="#F4C430" />
                      ))}
                    </div>
                    <div className="flex items-center space-x-1.5 bg-slate-100 px-3 py-1 rounded-full border border-gray-200 text-xs font-bold text-gray-700">
                      <svg className="w-3.5 h-3.5 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" />
                      </svg>
                      <span>Google Review</span>
                    </div>
                  </div>

                  {/* Service Badge Tag */}
                  {rev.service_type && (
                    <span className="inline-block bg-[#FFF8E1] text-[#0B1F3A] font-bold text-xs px-3 py-1 rounded-md mb-4 border border-[#F4C430]/40">
                      {rev.service_type}
                    </span>
                  )}

                  {/* Review Content */}
                  <p className="text-gray-700 text-base leading-relaxed mb-6 italic">
                    "{rev.text}"
                  </p>
                </div>

                {/* Author Footer */}
                <div className="pt-5 border-t border-gray-100 flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <img 
                      src={(rev.author_photo || rev.profile_photo_url)} 
                      alt={rev.author_name} 
                      className="w-11 h-11 rounded-cover object-cover border-2 border-[#F4C430]"
                    />
                    <div>
                      <h4 className="font-bold text-gray-900 text-sm leading-tight flex items-center space-x-1">
                        <span>{rev.author_name}</span>
                        <CheckCircle2 size={15} className="text-blue-500 flex-shrink-0" />
                      </h4>
                      <p className="text-gray-400 text-xs mt-0.5">{(rev.relative_time || rev.relative_time_description)}</p>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

      </section>

      {/* CTA EMERGENCY BANNER */}
      <section className="py-20 text-white relative overflow-hidden" style={{ backgroundColor: COLORS.black }}>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
          <h2 className="text-4xl md:text-5xl font-black mb-6 tracking-tight">
            Need an Auckland Locksmith <span style={{ color: COLORS.yellow }}>Right Now?</span>
          </h2>
          <p className="text-gray-300 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed mb-8">
            Experience our 5-star service for yourself. We reach all Auckland locations in 20-40 minutes, 24 hours a day, 7 days a week.
          </p>
          
          <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a 
              href="tel:0800828345" 
              className="inline-flex items-center space-x-3 px-10 py-5 rounded-full font-black text-xl uppercase tracking-wider shadow-2xl transition-all hover:scale-105"
              style={{ backgroundColor: COLORS.yellow, color: COLORS.black }}
            >
              <Phone size={24} className="fill-current" />
              <span>Call 0800 828 345</span>
            </a>
            <a 
              href="contact-us.html" 
              className="inline-flex items-center space-x-3 px-10 py-5 rounded-full font-black text-xl uppercase tracking-wider border-2 border-white hover:border-[#F4C430] hover:text-[#F4C430] transition-all"
            >
              <Mail size={24} />
              <span>Get Free Quote</span>
            </a>
          </div>
        </div>
      </section>

      <FooterComponent currentPage="company" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TestimonialsPageContent />);
</script>
</body>
</html>
